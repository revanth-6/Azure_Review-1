---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medishift-auth-service
  namespace: medishift-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medishift-auth-service
  template:
    metadata:
      labels:
        app: medishift-auth-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z medishift-postgres 5432; do echo waiting for postgres; sleep 3; done
      containers:
        - name: auth-service
          image: revanth654/medishift-auth:v2
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: medishift-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medishift-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medishift-config
                  key: NODE_ENV
            - name: STAFF_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medishift-config
                  key: STAFF_SERVICE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10

